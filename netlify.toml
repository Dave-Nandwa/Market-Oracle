[build]
  base    = "frontend"
  command = "pnpm run build"
  publish = "out"

[build.environment]
  NEXT_PUBLIC_API_URL      = "https://market-oracle-api-production.up.railway.app"
  NETLIFY_NEXT_PLUGIN_SKIP = "true"
  NODE_VERSION             = "20"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
